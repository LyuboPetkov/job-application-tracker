server {
    listen 80;
    server_name cams-tracker.online www.cams-tracker.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cams-tracker.online www.cams-tracker.online;

    ssl_certificate /etc/letsencrypt/live/cams-tracker.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cams-tracker.online/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}